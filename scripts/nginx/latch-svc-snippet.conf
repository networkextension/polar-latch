# nginx snippet — routes /api/latch/* to latch-svc (:8098).
# Pair with POLAR_LATCH_REMOTE=true on dock if/when dock learns to
# selectively forward (today, set this on the dock host and let nginx
# do the routing).

location ^~ /api/latch/ {
    proxy_pass http://127.0.0.1:8098;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    # Rule files can be a few MB (geosite + geoip + custom lists)
    client_max_body_size 50m;
}
